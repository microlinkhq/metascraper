version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/benchmark"
      - "/packages/*"
      - "/packages/*/benchmark"
    schedule:
      interval: "daily"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every weekday
      interval: "daily"
