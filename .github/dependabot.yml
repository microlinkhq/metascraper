version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/benchmark"
      - "/packages/*"
      - "/packages/*/benchmark"
    schedule:
      interval: "daily"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # These packages are ESM-only from their next major and the codebase
      # is CommonJS, so stay on the latest CJS-compatible major.
      - dependency-name: "got"
        update-types: ["version-update:semver-major"]
      - dependency-name: "cacheable-lookup"
        update-types: ["version-update:semver-major"]
      - dependency-name: "data-uri-to-buffer"
        update-types: ["version-update:semver-major"]
      - dependency-name: "get-video-id"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every weekday
      interval: "daily"
