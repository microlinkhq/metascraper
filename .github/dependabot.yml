version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/benchmark"
      - "/packages/*"
      - "/packages/*/benchmark"
    schedule:
      interval: "daily"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # These packages are ESM-only from their next major and the codebase
      # is CommonJS, so stay on the latest CJS-compatible major. Pinned via
      # explicit version ranges because grouped updates do not reliably honor
      # `update-types: version-update:semver-major`.
      - dependency-name: "got"
        versions: [">=12"]
      - dependency-name: "cacheable-lookup"
        versions: [">=7"]
      - dependency-name: "data-uri-to-buffer"
        versions: [">=6"]
      - dependency-name: "get-video-id"
        versions: [">=4"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every weekday
      interval: "daily"
